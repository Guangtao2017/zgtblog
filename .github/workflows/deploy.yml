name: 部署 Hugo 博客

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [post-updated]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: Guangtao2017/gt_vault
          path: temp-notes
          token: ${{ secrets.BLOG_SECRET }}
          fetch-depth: 1

      - name: 同步文章和图片
        run: |
          PUBLISHED_DIR="temp-notes/自媒体/published"
          ASSETS_DIR="temp-notes/自媒体/published/assets"
          
          rm -rf content/posts/*
          cp $PUBLISHED_DIR/*.md content/posts/ 2>/dev/null || true
          
          sed -i 's|assets/|/assets/|g' content/posts/*.md 2>/dev/null || true
          
          if [ -d "$ASSETS_DIR" ]; then
            mkdir -p static/assets
            cp -r $ASSETS_DIR/* static/assets/
            echo "✅ 图片复制到 static/assets"
          fi

      - name: 清理临时文件
        run: rm -rf temp-notes

      - uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.164.0"

      - run: hugo --minify

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4